version: "3.9"

services:
  # ── Blend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blend-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Cosmos DB emulator connection (override via .env or environment)
      CosmosDb__ConnectionString: "${COSMOS_EMULATOR_CONNECTION_STRING:-AccountEndpoint=https://cosmos-emulator:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;}"
      CosmosDb__DatabaseName: blend-dev
      # CORS – allow the local Next.js dev server
      Cors__AllowedOrigins__0: http://localhost:3000
    depends_on:
      cosmos-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - blend-network

  # ── Azure Cosmos DB Emulator ───────────────────────────────────────────────
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: blend-cosmos-emulator
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: 127.0.0.1
    volumes:
      - cosmos-emulator-data:/data/db
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - blend-network

networks:
  blend-network:
    driver: bridge

volumes:
  cosmos-emulator-data:
