name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.static_web_app_url }}

    defaults:
      run:
        working-directory: src/Blend.Web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Blend.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/Blend.Web
          output_location: out
          skip_app_build: true

  smoke-tests:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions: {}

    steps:
      - name: Wait for deployment to stabilise
        run: sleep 30

      - name: Smoke test — homepage responds
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.FRONTEND_URL }}/")
          if [ "$status" != "200" ]; then
            echo "Homepage smoke test failed with status $status"
            exit 1
          fi
          echo "Homepage smoke test passed (HTTP $status)"

      - name: Smoke test — API proxy route reachable
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.FRONTEND_URL }}/api/healthz")
          if [ "$status" = "000" ]; then
            echo "API proxy route unreachable"
            exit 1
          fi
          echo "API proxy smoke test passed (HTTP $status)"
