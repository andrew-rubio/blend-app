name: CI

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

jobs:
  # ── Backend: restore → build → test ────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/backend/Blend.slnx

      - name: Build solution
        run: dotnet build src/backend/Blend.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test src/tests/Blend.Tests.Unit/ \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: |
          dotnet test src/tests/Blend.Tests.Integration/ \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=integration-test-results.trx"

      - name: Publish OpenAPI spec artifact
        run: |
          dotnet publish src/backend/Blend.Api/Blend.Api.csproj \
            --no-build \
            --configuration Release \
            --output /tmp/api-publish

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            **/unit-test-results.trx
            **/integration-test-results.trx
          retention-days: 7

  # ── Frontend: install → lint → type-check → test → build ───────────────────
  frontend:
    name: Frontend — Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/Blend.Web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Blend.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --reporter=verbose --coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/Blend.Web/coverage/
          retention-days: 7

  # ── Documentation: mkdocs build --strict ───────────────────────────────────
  docs:
    name: Documentation — MkDocs Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build documentation (strict)
        run: mkdocs build --strict

  # ── Security: dependency review ────────────────────────────────────────────
  security:
    name: Security — Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
